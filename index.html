<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>言葉の検索エンジン</title>
  <style>
    :root { --primary: #89c3eb; --bg: #f8fbfd; --text: #4a4a4a; --border: #d1e4f3; }
    body { font-family: sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; }
    .container { max-width: 1000px; margin: 0 auto; }
    .search-panel { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .input-group { display: flex; flex-direction: column; margin-bottom: 10px; }
    label { font-size: 0.8rem; color: #888; margin-bottom: 3px; }
    input, select { padding: 8px; border: 1px solid var(--border); border-radius: 4px; outline: none; }
    .button-area { margin-top: 15px; display: flex; gap: 10px; align-items: center; }
    .btn-search { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    .btn-search:disabled { background: #ccc; }
    .add-cond { background: none; border: 1px dashed var(--primary); color: var(--primary); padding: 5px 10px; border-radius: 20px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
    th { background: #eef7fe; padding: 12px; border-bottom: 2px solid var(--border); text-align: left; }
    td { padding: 12px; border-bottom: 1px solid #eee; }
    .word-link { color: var(--primary); font-weight: bold; text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="color:var(--primary); font-weight:normal; border-bottom: 1px solid var(--border); padding-bottom: 10px;">言葉の検索エンジン</h1>
    <div class="search-panel">
      <div id="fields" class="grid">
        <div class="input-group"><label>文字数</label><input type="number" id="len"></div>
        <div class="input-group"><label>開始文字</label><input type="text" id="start"></div>
        <div class="input-group"><label>終了文字</label><input type="text" id="end"></div>
        <div class="input-group"><label>？検索</label><input type="text" id="wild"></div>
      </div>
      <div class="button-area">
        <button class="btn-search" onclick="doSearch()">検索を実行</button>
        <select class="add-cond" onchange="addField(this)">
          <option value="">＋ 追加条件</option>
          <option value="n-pos">n文字目の指定</option>
          <option value="contains-n">特定の文字をn回含む</option>
          <option value="all-in">全て含む/並び順含む</option>
          <option value="rhyme">韻（完全/脚韻）</option>
          <option value="replace">置換して成り立つか</option>
          <option value="only-excl">構成文字/除外文字</option>
        </select>
      </div>
    </div>
    <p id="status">条件を入力して「検索を実行」を押してください。</p>
    <table>
      <thead><tr><th style="width:10%">数</th><th style="width:25%">単語</th><th style="width:25%">読み</th><th style="width:40%">備考</th></tr></thead>
      <tbody id="results"></tbody>
    </table>
  </div>

<script>
// GitHubのアドレスを定義
const REPO_URL = "https://graystar6174.github.io/word-search-engine/data";

function addField(sel){
  const v = sel.value; if(!v) return;
  const g = document.getElementById('fields');
  let h = '';
  if(v==='n-pos') h='<div class="input-group"><label>n位置</label><input type="number" id="nPos"></div><div class="input-group"><label>文字</label><input type="text" id="nVal"></div>';
  if(v==='contains-n') h='<div class="input-group"><label>含む字</label><input type="text" id="char"></div><div class="input-group"><label>回数</label><input type="number" id="num"></div>';
  if(v==='all-in') h='<div class="input-group"><label>全て含む</label><input type="text" id="all"></div><div class="input-group"><label>並び</label><input type="text" id="seq"></div>';
  if(v==='rhyme') h='<div class="input-group"><label>韻完全</label><input type="text" id="bFull"></div><div class="input-group"><label>脚韻</label><input type="text" id="bEnd"></div>';
  if(v==='replace') h='<div class="input-group"><label>置換前</label><input type="text" id="pre"></div><div class="input-group"><label>置換後</label><input type="text" id="post"></div>';
  if(v==='only-excl') h='<div class="input-group"><label>のみ構成</label><input type="text" id="only"></div><div class="input-group"><label>除外文字</label><input type="text" id="excl"></div>';
  g.insertAdjacentHTML('beforeend', h);
  sel.options[sel.selectedIndex].disabled = true;
  sel.value="";
}

function get(id){ return document.getElementById(id) ? document.getElementById(id).value : ""; }

async function doSearch() {
  const btn = document.querySelector(".btn-search");
  const status = document.getElementById("status");
  const tbody = document.getElementById("results");
  
  btn.disabled = true;
  status.innerText = "データを読み込み中...";
  tbody.innerHTML = "";

  try {
    // 1. インデックスを取得
    const resIdx = await fetch(`${REPO_URL}/index.json`);
    if (!resIdx.ok) throw new Error("Index file not found");
    const indexData = await resIdx.json();

    // 2. 全チャンクを読み込む（日本語ファイル名対応のためencodeURIComponentを使用）
    const promises = indexData.files.map(file => {
      // "chunks/ねぇ.json" のような形式をURL安全に変換
      const safePath = file.split('/').map(part => encodeURIComponent(part)).join('/');
      return fetch(`${REPO_URL}/${safePath}`).then(r => r.ok ? r.json() : []);
    });

    const chunkResults = await Promise.all(promises);
    const allData = chunkResults.flat();
    const allReadings = new Set(allData.map(r => String(r[1])));

    // 3. 条件取得
    const c = {
      len: get('len'), start: get('start'), end: get('end'), wild: get('wild'),
      nPos: get('nPos'), nVal: get('nVal'), char: get('char'), num: get('num'),
      all: get('all'), seq: get('seq'), bFull: get('bFull'), bEnd: get('bEnd'),
      pre: get('pre'), post: get('post'), only: get('only'), excl: get('excl')
    };

    // 4. フィルタリング
    const filtered = allData.filter(row => {
      const [word, reading, note, length, boin] = row;
      if (c.len && length != c.len) return false;
      if (c.start && !reading.startsWith(c.start)) return false;
      if (c.end && !reading.endsWith(c.end)) return false;
      if (c.nPos && reading[parseInt(c.nPos)-1] !== c.nVal) return false;
      if (c.wild) {
        const reg = new RegExp("^" + c.wild.replace(/？|\?/g, ".") + "$");
        if (!reg.test(reading)) return false;
      }
      if (c.char && c.num) {
        const cnt = reading.split(c.char).length - 1;
        if (cnt != c.num) return false;
      }
      if (c.all) {
        for (let ch of c.all) {
          const req = c.all.split(ch).length - 1;
          const act = reading.split(ch).length - 1;
          if (act < req) return false;
        }
      }
      if (c.seq && !reading.includes(c.seq)) return false;
      if (c.only && !(new RegExp(`^[${c.only}]+$`).test(reading))) return false;
      if (c.excl && (new RegExp(`[${c.excl}]`).test(reading))) return false;
      if (c.bFull && boin !== c.bFull) return false;
      if (c.bEnd && !boin.endsWith(c.bEnd)) return false;
      if (c.pre && c.post) {
        if (!reading.includes(c.pre)) return false;
        const rep = reading.split(c.pre).join(c.post);
        if (!allReadings.has(rep)) return false;
      }
      return true;
    });

    // 5. 表示
    status.innerText = filtered.length + " 件ヒットしました。";
    tbody.innerHTML = filtered.map(r => `
      <tr>
        <td>${r[3]}</td>
        <td><a class="word-link" target="_blank" href="https://www.google.com/search?q=${encodeURIComponent(r[0])}">${r[0]}</a></td>
        <td>${r[1]}</td>
        <td>${r[2]}</td>
      </tr>`).join("");

  } catch (err) {
    console.error(err);
    status.innerText = "エラー: データの読み込みに失敗しました。";
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
