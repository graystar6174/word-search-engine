<script>
const BASE = "https://graystar6174.github.io/word-search-engine/data";

// 既存のaddField, get関数はそのまま...

async function loadAll() {
  const res = await fetch(BASE + "/index.json");
  const json = await res.json();
  const list = json.files;

  // 全チャンクを並列で取得して高速化
  const promises = list.map(file => fetch(BASE + "/" + file).then(r => r.json()));
  const results = await Promise.all(promises);
  return results.flat();
}

function match(row, c, allReadings) {
  const [word, reading, note, length, boin] = row;

  if (c.len && length != c.len) return false;
  if (c.start && !reading.startsWith(c.start)) return false;
  if (c.end && !reading.endsWith(c.end)) return false;
  
  // n文字目指定 (1-indexedを0-indexedへ)
  if (c.nPos && reading[parseInt(c.nPos) - 1] !== c.nVal) return false;

  if (c.wild) {
    const reg = new RegExp("^" + c.wild.replace(/？|\?/g, ".") + "$");
    if (!reg.test(reading)) return false;
  }

  if (c.char && c.num) {
    const cnt = reading.split(c.char).length - 1;
    if (cnt != c.num) return false;
  }

  // 指定文字を全て含む（重複対応）
  if (c.all) {
    for (let ch of c.all) {
      const req = c.all.split(ch).length - 1;
      const act = reading.split(ch).length - 1;
      if (act < req) return false;
    }
  }

  if (c.seq && !reading.includes(c.seq)) return false;
  if (c.only && !(new RegExp(`^[${c.only}]+$`).test(reading))) return false;
  if (c.excl && (new RegExp(`[${c.excl}]`).test(reading))) return false;

  if (c.bFull && boin !== c.bFull) return false;
  if (c.bEnd && !boin.endsWith(c.bEnd)) return false;

  if (c.pre && c.post) {
    if (!reading.includes(c.pre)) return false;
    const rep = reading.split(c.pre).join(c.post);
    if (!allReadings.has(rep)) return false;
  }

  return true;
}

async function doSearch() {
  const btn = document.querySelector(".btn-search");
  btn.disabled = true;
  document.getElementById("status").innerText = "データを読み込み中...";

  try {
    const c = {
      len: get('len'), start: get('start'), end: get('end'), wild: get('wild'),
      nPos: get('nPos'), nVal: get('nVal'), char: get('char'), num: get('num'),
      all: get('all'), seq: get('seq'), bFull: get('bFull'), bEnd: get('bEnd'),
      pre: get('pre'), post: get('post'), only: get('only'), excl: get('excl')
    };

    const data = await loadAll();
    const allReadings = new Set(data.map(r => r[1]));
    const res = data.filter(r => match(r, c, allReadings));

    document.getElementById("status").innerText = res.length + " 件ヒット";
    document.getElementById("results").innerHTML = res.map(r => `
      <tr>
        <td>${r[3]}</td>
        <td><a class="word-link" target="_blank" href="https://www.google.com/search?q=${encodeURIComponent(r[0])}">${r[0]}</a></td>
        <td>${r[1]}</td>
        <td>${r[2]}</td>
      </tr>`).join("");
  } catch (e) {
    document.getElementById("status").innerText = "エラーが発生しました。";
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}
</script>
