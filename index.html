<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>言葉の検索エンジン</title>
  <style>
    :root { --primary: #89c3eb; --bg: #f8fbfd; --text: #4a4a4a; --border: #d1e4f3; }
    body { font-family: sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
    .container { max-width: 1000px; margin: 0 auto; flex: 1; width: 100%; }
    .search-panel { background: white; padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
    
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
    .panel-title { font-size: 0.9rem; font-weight: bold; color: var(--primary); }
    .toggle-btn { background: var(--primary); color: white; border: none; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-weight: bold; line-height: 20px; }
    
    #search-summary { display: none; cursor: pointer; padding: 10px; background: #f0f7ff; border-radius: 8px; border: 1px dashed var(--primary); }
    .summary-item { display: inline-block; background: white; border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; margin: 2px; font-size: 0.85rem; color: #555; }

    .grid { display: flex; flex-wrap: wrap; gap: 12px; padding-bottom: 10px; border-bottom: 1px solid #eee; margin-bottom: 10px; }
    .input-group { display: flex; flex-direction: column; }
    label { font-size: 0.75rem; color: #888; margin-bottom: 2px; }
    
    #base-len, #base-start, #base-end { width: 50px; } 
    #base-wild { width: 120px; }

    #dynamic-fields { margin-bottom: 10px; }
    .cond-row { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid #f0f5f9; gap: 8px; flex-wrap: wrap; font-size: 0.9rem; }
    
    input, select { padding: 6px; border: 1px solid var(--border); border-radius: 4px; outline: none; font-size: 0.9rem; }
    input[type="number"] { width: 50px; }
    .input-short { width: 50px; }
    .input-rhyme-end { width: 120px; } 
    .input-rhyme-full { width: 160px; } 

    .btn-remove { background: #ffeded; color: #ff5e5e; border: none; width: 22px; height: 22px; border-radius: 50%; cursor: pointer; margin-left: auto; font-size: 12px; }

    .button-area { margin-top: 10px; display: flex; gap: 10px; align-items: center; position: relative; }
    .btn-search { background: var(--primary); color: white; border: none; padding: 8px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }

    /* カスタムプルダウン（動的表示位置） */
    .custom-select-container { position: relative; }
    .custom-select-trigger { background: white; border: 1px dashed var(--primary); color: var(--primary); padding: 6px 12px; border-radius: 20px; cursor: pointer; min-width: 150px; font-size: 0.9rem; text-align: left; display: inline-block; transition: background 0.2s; }
    .custom-select-trigger:hover { background: #f0f7ff; }
    .custom-options { display: none; position: absolute; left: 0; background: white; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; min-width: 220px; padding: 5px 0; }
    .custom-options div { padding: 10px 15px; cursor: pointer; font-size: 0.9rem; color: var(--text); border-bottom: 1px solid #f9f9f9; }
    .custom-options div:last-child { border-bottom: none; }
    .custom-options div:hover { background: #f0f7ff; color: var(--primary); }
    .custom-options.show { display: block; }
    /* 上方向に表示する際のアニメーション用クラス */
    .drop-up { bottom: 120%; top: auto; }
    .drop-down { top: 110%; bottom: auto; }

    table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
    th { background: #eef7fe; padding: 10px; border-bottom: 2px solid var(--border); text-align: left; font-size: 0.85rem; }
    td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    .word-link { color: var(--primary); font-weight: bold; text-decoration: underline; }

    /* 最下部の説明スペース */
    .description-footer { margin-top: 40px; padding: 30px 20px; background: #fff; border-top: 1px solid var(--border); color: #777; font-size: 0.85rem; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="color:var(--primary); font-weight:normal; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px;">言葉の検索エンジン</h1>
    
    <div class="search-panel" id="panel">
      <div class="panel-header">
        <span class="panel-title">検索条件設定</span>
        <button class="toggle-btn" id="toggle-btn" onclick="togglePanel()">−</button>
      </div>

      <div id="panel-content">
        <div class="grid">
          <div class="input-group"><label>文字数</label><input type="number" id="base-len"></div>
          <div class="input-group"><label>開始</label><input type="text" id="base-start"></div>
          <div class="input-group"><label>終了</label><input type="text" id="base-end"></div>
          <div class="input-group"><label>？検索</label><input type="text" id="base-wild"></div>
        </div>

        <div id="dynamic-fields"></div>

        <div class="button-area">
          <div class="custom-select-container">
            <div class="custom-select-trigger" id="dropdown-trigger" onclick="toggleDropdown(event)">＋ 条件を追加</div>
            <div class="custom-options" id="custom-options"></div>
          </div>
          <button class="btn-search" onclick="doSearch()">検索を実行</button>
        </div>
      </div>
      <div id="search-summary" onclick="togglePanel()"></div>
    </div>
    
    <p id="status">条件を入力してください。</p>

    <table>
      <thead><tr><th style="width:10%">数</th><th style="width:25%">単語</th><th style="width:25%">読み</th><th style="width:40%">備考</th></tr></thead>
      <tbody id="results"></tbody>
    </table>
  </div>

  <footer class="description-footer">
    <div style="max-width: 1000px; margin: 0 auto;">
      <h3 style="color: var(--primary); margin-top: 0;">ご利用方法 / 備考</h3>
      <p>ここに検索エンジンの使い方の詳細や、データの出典、更新情報などを記載できます。</p>
      <ul>
        <li><b>n文字目の指定:</b> 特定の位置にある文字を固定して検索します。</li>
        <li><b>入力欄の並びを含む:</b> 入力した文字列がそのままの順序で含まれる単語を検索します。</li>
        <li><b>置換して成り立つか:</b> 指定した文字を入れ替えても辞書に存在する単語をリストアップします。</li>
      </ul>
    </div>
  </footer>

<script>
const REPO_URL = "https://graystar6174.github.io/word-search-engine/data";

const COND_MASTER = [
  { val: "n-pos", text: "n文字目の指定", multi: true },
  { val: "contains-n", text: "特定の文字をn回含む", multi: true },
  { val: "seq", text: "の並びを含む", multi: true }, 
  { val: "replace", text: "置換して成り立つか", multi: true },
  { val: "all-in", text: "全て含む", multi: false },
  { val: "rhyme-full", text: "韻（完全一致）", multi: false, group: "rhyme" },
  { val: "rhyme-end", text: "韻（脚韻）", multi: false, group: "rhyme" },
  { val: "only", text: "構成文字のみ", multi: false },
  { val: "excl", text: "除外文字", multi: false }
];

window.onload = updateDropdown;

window.onclick = function(e) {
  if (!e.target.matches('.custom-select-trigger')) {
    document.getElementById('custom-options').classList.remove('show');
  }
};

function toggleDropdown(e) {
  e.stopPropagation();
  const optionsDiv = document.getElementById('custom-options');
  const trigger = document.getElementById('dropdown-trigger');
  
  // 表示位置の計算
  const rect = trigger.getBoundingClientRect();
  const windowHeight = window.innerHeight;
  const spaceBelow = windowHeight - rect.bottom;
  
  // 下に250px以上のスペースがなければ上方向に展開
  if (spaceBelow < 250) {
    optionsDiv.classList.remove('drop-down');
    optionsDiv.classList.add('drop-up');
  } else {
    optionsDiv.classList.remove('drop-up');
    optionsDiv.classList.add('drop-down');
  }

  optionsDiv.classList.toggle('show');
}

function togglePanel() {
  const content = document.getElementById('panel-content');
  const summary = document.getElementById('search-summary');
  const btn = document.getElementById('toggle-btn');
  if (content.style.display === 'none') {
    content.style.display = 'block'; summary.style.display = 'none'; btn.innerText = '−';
  } else {
    content.style.display = 'none'; updateSummary(); summary.style.display = 'block'; btn.innerText = '＋';
  }
}

function updateSummary() {
  const items = [];
  const b = (id) => document.getElementById(id).value;
  if(b('base-len')) items.push(`${b('base-len')}文字`);
  if(b('base-start')) items.push(`${b('base-start')}～`);
  if(b('base-end')) items.push(`～${b('base-end')}`);
  if(b('base-wild')) items.push(`？：${b('base-wild')}`);

  document.querySelectorAll('.cond-row').forEach(row => {
    const type = row.dataset.type;
    const v1 = row.querySelector('.val1')?.value || "?";
    const v2 = row.querySelector('.val2')?.value || "?";
    if(type==='n-pos') items.push(`${v1}文字目：${v2}`);
    if(type==='contains-n') {
      const op = row.querySelector('.op');
      items.push(`「${v1}」${v2}回(${op.options[op.selectedIndex].text})`);
    }
    if(type==='all-in') items.push(`全含：${v1}`);
    if(type==='seq') items.push(`並び：${v1}`);
    if(type==='rhyme-full') items.push(`全韻：${v1}`);
    if(type==='rhyme-end') items.push(`脚韻：${v1}`);
    if(type==='replace') items.push(`${v1}→${v2}`);
    if(type==='only') items.push(`のみ：${v1}`);
    if(type==='excl') items.push(`除外：${v1}`);
  });
  
  document.getElementById('search-summary').innerHTML = items.length > 0 
    ? items.map(text => `<span class="summary-item">${text}</span>`).join('') 
    : '<span class="summary-item">条件なし</span>';
}

function addNewField(val) {
  const container = document.getElementById('dynamic-fields');
  const row = document.createElement('div');
  row.className = 'cond-row';
  row.dataset.type = val;
  
  let h = '';
  if(val==='n-pos') h = `<input type="number" class="val1"> 文字目が <input type="text" class="val2 input-short">`;
  if(val==='contains-n') h = `<input type="text" class="val1 input-short"> を <input type="number" class="val2"> 回 <select class="op"><option value="eq">ちょうど</option><option value="ge">以上</option><option value="le">以下</option></select> 含む`;
  if(val==='all-in') h = `全て含む：<input type="text" class="val1 input-short">`;
  if(val==='seq') h = `<input type="text" class="val1 input-short"> の並びを含む`; 
  if(val==='rhyme-full') h = `韻(完全)：<input type="text" class="val1 input-rhyme-full">`;
  if(val==='rhyme-end') h = `脚韻：<input type="text" class="val1 input-rhyme-end">`;
  if(val==='replace') h = `<input type="text" class="val1 input-short"> → <input type="text" class="val2 input-short"> に置換可能`;
  if(val==='only') h = `文字のみ：<input type="text" class="val1 input-short">`;
  if(val==='excl') h = `除外文字：<input type="text" class="val1 input-short">`;

  row.innerHTML = h + `<button class="btn-remove" onclick="removeField(this)">×</button>`;
  container.appendChild(row);

  document.getElementById('custom-options').classList.remove('show');
  updateDropdown();
}

function removeField(btn) {
  btn.parentNode.remove();
  updateDropdown();
}

function updateDropdown() {
  const optionsDiv = document.getElementById('custom-options');
  const current = Array.from(document.querySelectorAll('.cond-row')).map(r => r.dataset.type);
  const hasRhyme = current.some(t => t === 'rhyme-full' || t === 'rhyme-end');

  optionsDiv.innerHTML = '';

  COND_MASTER.forEach(m => {
    let shouldHide = false;
    if(m.group === 'rhyme' && hasRhyme) shouldHide = true;
    if(!m.multi && current.includes(m.val)) shouldHide = true;

    if(!shouldHide) {
      const opt = document.createElement('div');
      opt.textContent = m.text;
      opt.onclick = () => addNewField(m.val);
      optionsDiv.appendChild(opt);
    }
  });
}

async function doSearch() {
  const status = document.getElementById("status");
  const tbody = document.getElementById("results");
  const base = {
    len: document.getElementById('base-len').value,
    start: document.getElementById('base-start').value,
    end: document.getElementById('base-end').value,
    wild: document.getElementById('base-wild').value
  };
  const dynamicRows = Array.from(document.querySelectorAll('.cond-row'));

  if (!base.len && !base.start && !base.end && !base.wild && dynamicRows.length === 0) {
    status.innerText = "条件を入力してください。";
    tbody.innerHTML = "";
    return;
  }
  
  status.innerText = "読み込み中...";
  try {
    const resIdx = await fetch(`${REPO_URL}/index.json`);
    const indexData = await resIdx.json();
    const promises = indexData.files.map(file => fetch(`${REPO_URL}/${file.split('/').map(p => encodeURIComponent(p)).join('/')}`).then(r => r.ok ? r.json() : []));

    const chunkResults = await Promise.all(promises);
    const allData = chunkResults.flat();
    const allReadings = new Set(allData.map(r => String(r[1])));

    const conds = dynamicRows.map(row => ({
      type: row.dataset.type,
      v1: row.querySelector('.val1')?.value || "",
      v2: row.querySelector('.val2')?.value || "",
      op: row.querySelector('.op')?.value || "eq"
    }));

    const filtered = allData.filter(row => {
      const [word, reading, note, length, boin] = row;
      if (base.len && length != base.len) return false;
      if (base.start && !reading.startsWith(base.start)) return false;
      if (base.end && !reading.endsWith(base.end)) return false;
      if (base.wild) {
        const reg = new RegExp("^" + base.wild.replace(/？|\?/g, ".") + "$");
        if (!reg.test(reading)) return false;
      }
      for (const c of conds) {
        if (c.type === 'n-pos' && c.v1 && c.v2) { if (reading[parseInt(c.v1) - 1] !== c.v2) return false; }
        else if (c.type === 'contains-n' && c.v1 && c.v2) {
          const cnt = reading.split(c.v1).length - 1;
          const target = parseInt(c.v2);
          if (c.op === 'eq' && cnt !== target) return false;
          if (c.op === 'ge' && cnt < target) return false;
          if (c.op === 'le' && cnt > target) return false;
        }
        else if (c.type === 'all-in' && c.v1) { for (let ch of c.v1) if ((reading.split(ch).length - 1) < (c.v1.split(ch).length - 1)) return false; }
        else if (c.type === 'seq' && c.v1 && !reading.includes(c.v1)) return false;
        else if (c.type === 'rhyme-full' && c.v1 && boin !== c.v1) return false;
        else if (c.type === 'rhyme-end' && c.v1 && !boin.endsWith(c.v1)) return false;
        else if (c.type === 'replace' && c.v1 && c.v2) {
          if (!reading.includes(c.v1)) return false;
          const rep = reading.split(c.v1).join(c.v2);
          if (!allReadings.has(rep)) return false;
        }
        else if (c.type === 'only' && c.v1 && !(new RegExp(`^[${c.v1}]+$`).test(reading))) return false;
        else if (c.type === 'excl' && c.v1 && (new RegExp(`[${c.v1}]`).test(reading))) return false;
      }
      return true;
    });

    status.innerText = filtered.length + " 件ヒット";
    tbody.innerHTML = filtered.map(r => `<tr><td>${r[3]}</td><td><a class="word-link" target="_blank" href="https://www.google.com/search?q=${encodeURIComponent(r[0])}">${r[0]}</a></td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join("");
  } catch (err) {
    status.innerText = "エラー発生";
  }
}
</script>
</body>
</html>
