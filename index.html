<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>言葉の検索エンジン</title>
  <style>
    :root { --primary: #89c3eb; --bg: #f8fbfd; --text: #4a4a4a; --border: #d1e4f3; }
    body { font-family: sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
    .container { max-width: 1100px; margin: 0 auto; flex: 1; width: 100%; }
    .search-panel { background: white; padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
    
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
    .panel-title { font-size: 0.9rem; font-weight: bold; color: var(--primary); }
    .toggle-btn { background: var(--primary); color: white; border: none; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-weight: bold; line-height: 20px; }
    
    #search-summary { display: none; cursor: pointer; padding: 10px; background: #f0f7ff; border-radius: 8px; border: 1px dashed var(--primary); }
    .summary-item { display: inline-block; background: white; border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; margin: 2px; font-size: 0.85rem; color: #555; }

    .grid { display: flex; flex-wrap: wrap; gap: 12px; padding-bottom: 10px; border-bottom: 1px solid #eee; margin-bottom: 10px; }
    .input-group { display: flex; flex-direction: column; }
    label { font-size: 0.75rem; color: #888; margin-bottom: 2px; }
    
    #base-len, #base-start, #base-end { width: 50px; } 
    #base-wild { width: 120px; }

    #dynamic-fields { margin-bottom: 15px; }
    .cond-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f5f9; gap: 8px; flex-wrap: wrap; font-size: 0.9rem; }
    
    input, select { padding: 6px; border: 1px solid var(--border); border-radius: 4px; outline: none; font-size: 0.9rem; }
    input[type="number"] { width: 50px; }
    .btn-remove { background: #ffeded; color: #ff5e5e; border: none; width: 22px; height: 22px; border-radius: 50%; cursor: pointer; margin-left: auto; font-size: 12px; }

    .button-area { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; border-top: 1px solid #eee; padding-top: 15px; }
    .btn-search { background: var(--primary); color: white; border: none; padding: 10px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    
    .filter-options { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.85rem; color: #666; align-items: center; }
    .filter-group { display: flex; align-items: center; gap: 4px; }
    .filter-group input[type="checkbox"] { cursor: pointer; margin: 0; }

    .custom-select-container { position: relative; margin-bottom: 10px; }
    .custom-select-trigger { background: white; border: 1px dashed var(--primary); color: var(--primary); padding: 6px 12px; border-radius: 20px; cursor: pointer; min-width: 150px; font-size: 0.9rem; text-align: left; }
    .custom-options { display: none; position: absolute; left: 0; bottom: 100%; margin-bottom: 5px; background: white; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 1000; min-width: 250px; }
    .custom-options div { padding: 10px 15px; cursor: pointer; font-size: 0.9rem; border-bottom: 1px solid #f9f9f9; }
    .custom-options div:hover { background: #f0f7ff; }
    .custom-options.show { display: block; }

    table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    th { background: #eef7fe; padding: 12px 10px; border-bottom: 2px solid var(--border); text-align: left; font-size: 0.85rem; color: #5a7d9a; }
    td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
    .word-link { color: var(--primary); font-weight: bold; text-decoration: underline; }

    .description-footer { margin-top: 40px; padding: 30px 20px; background: #fff; border-top: 1px solid var(--border); color: #777; font-size: 0.85rem; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="color:var(--primary); font-weight:normal; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px;">言葉の検索エンジン</h1>
    
    <div class="search-panel" id="panel">
      <div class="panel-header">
        <span class="panel-title">検索条件設定</span>
        <button class="toggle-btn" id="toggle-btn" onclick="togglePanel()">−</button>
      </div>

      <div id="panel-content">
        <div class="grid">
          <div class="input-group"><label>文字数</label><input type="number" id="base-len"></div>
          <div class="input-group"><label>開始</label><input type="text" id="base-start"></div>
          <div class="input-group"><label>終了</label><input type="text" id="base-end"></div>
          <div class="input-group"><label>？検索</label><input type="text" id="base-wild"></div>
        </div>

        <div id="dynamic-fields"></div>

        <div class="custom-select-container">
          <div class="custom-select-trigger" id="dropdown-trigger" onclick="toggleDropdown(event)">＋ 条件を追加</div>
          <div class="custom-options" id="custom-options"></div>
        </div>

        <div class="button-area">
          <button class="btn-search" onclick="doSearch()">検索を実行</button>
          
          <div class="filter-options">
            <div class="filter-group">
              <input type="checkbox" id="filter-general"> <label for="filter-general">一般的のみ</label>
            </div>
            <span style="color:#ddd">|</span>
            <div class="filter-group"><input type="checkbox" id="ex-proper" onchange="syncProper(this)"> <label for="ex-proper">固有名詞除外</label></div>
            <div class="filter-group"><input type="checkbox" id="ex-person" class="sub-ex"> <label for="ex-person">人名</label></div>
            <div class="filter-group"><input type="checkbox" id="ex-place" class="sub-ex"> <label for="ex-place">地名</label></div>
            <div class="filter-group"><input type="checkbox" id="ex-work" class="sub-ex"> <label for="ex-work">作品名</label></div>
            <div class="filter-group"><input type="checkbox" id="ex-verb"> <label for="ex-verb">動詞除外</label></div>
          </div>
        </div>
      </div>
      <div id="search-summary" onclick="togglePanel()"></div>
    </div>
    
    <p id="status">条件を入力して検索ボタンを押してください。</p>

    <table>
      <thead><tr><th style="width:10%">文字数</th><th style="width:25%">単語</th><th style="width:25%">読み</th><th style="width:40%">備考</th></tr></thead>
      <tbody id="results"></tbody>
    </table>
  </div>

  <footer class="description-footer" id="footer-area"></footer>

<script>
const REPO_URL = "https://graystar6174.github.io/word-search-engine/data";
let activeConditions = new Set();

function syncProper(master) {
  const subs = document.querySelectorAll('.sub-ex');
  subs.forEach(s => s.checked = master.checked);
}

const COND_MASTER = [
  { val: "n-pos", text: "n文字目の指定", singleton: false },
  { val: "contains-n", text: "特定の文字をn回含む", singleton: false },
  { val: "seq", text: "の並びを含む", singleton: false }, 
  { val: "rhyme-full", text: "韻（完全一致）", singleton: true, group: "rhyme" },
  { val: "rhyme-end", text: "韻（脚韻）", singleton: true, group: "rhyme" },
  { val: "all-in", text: "任意の文字を全て含む", singleton: true },
  { val: "only", text: "任意の文字で構成", singleton: true },
  { val: "excl", text: "任意の文字を除外", singleton: true },
  { val: "replace", text: "文字列を置換しても成立", singleton: false }
];

window.onload = () => {
  updateDropdown();
  document.getElementById('footer-area').innerHTML = `<h3>備考</h3><p>最新のデータで検索を行います。置換機能は辞書に存在する単語への変化を判定します。</p>`;
};

function toggleDropdown(e) {
  e.stopPropagation();
  document.getElementById('custom-options').classList.toggle('show');
}

document.addEventListener('click', () => {
  document.getElementById('custom-options').classList.remove('show');
});

function togglePanel() {
  const content = document.getElementById('panel-content');
  const summary = document.getElementById('search-summary');
  const btn = document.getElementById('toggle-btn');
  if (content.style.display === 'none') {
    content.style.display = 'block'; summary.style.display = 'none'; btn.innerText = '−';
  } else {
    content.style.display = 'none'; updateSummary(); summary.style.display = 'block'; btn.innerText = '＋';
  }
}

function updateSummary() {
  const items = [];
  const b = (id) => document.getElementById(id).value;
  if(b('base-len')) items.push(`${b('base-len')}文字`);
  if(document.getElementById('filter-general').checked) items.push("一般的のみ");
  document.getElementById('search-summary').innerHTML = items.length > 0 
    ? items.map(text => `<span class="summary-item">${text}</span>`).join('') 
    : '<span class="summary-item">条件設定中</span>';
}

function addNewField(val) {
  const master = COND_MASTER.find(m => m.val === val);
  if (master.singleton) activeConditions.add(val);
  if (master.group) activeConditions.add(master.group);

  const container = document.getElementById('dynamic-fields');
  const row = document.createElement('div');
  row.className = 'cond-row';
  row.dataset.type = val;
  row.dataset.group = master.group || "";
  
  let h = '';
  if(val==='n-pos') h = `<input type="number" class="val1"> 文字目が <input type="text" class="val2" style="width:50px">`;
  if(val==='contains-n') h = `<input type="text" class="val1" style="width:50px"> を <input type="number" class="val2"> 回 <select class="op"><option value="eq">ちょうど</option><option value="ge">以上</option><option value="le">以下</option></select> 含む`;
  if(val==='seq') h = `<input type="text" class="val1" style="width:80px"> の並びを含む`; 
  if(val==='rhyme-full') h = `韻(完全)：<input type="text" class="val1" style="width:120px">`;
  if(val==='rhyme-end') h = `脚韻：<input type="text" class="val1" style="width:120px">`;
  if(val==='all-in') h = `全て含む：<input type="text" class="val1" style="width:150px">`;
  if(val==='only') h = `構成文字：<input type="text" class="val1" style="width:150px">`;
  if(val==='excl') h = `除外文字：<input type="text" class="val1" style="width:150px">`;
  if(val==='replace') h = `<input type="text" class="val1" style="width:70px"> → <input type="text" class="val2" style="width:70px"> に置換して成立`;
  
  row.innerHTML = h + `<button class="btn-remove" onclick="removeField(this, '${val}', '${master.group || ""}')">×</button>`;
  container.appendChild(row);
  updateDropdown();
}

function removeField(btn, val, group) {
  btn.parentNode.remove();
  activeConditions.delete(val);
  if (group) activeConditions.delete(group);
  updateDropdown();
}

function updateDropdown() {
  const optionsDiv = document.getElementById('custom-options');
  optionsDiv.innerHTML = '';
  COND_MASTER.forEach(m => {
    if (m.singleton && activeConditions.has(m.val)) return;
    if (m.group && activeConditions.has(m.group)) return;
    
    const opt = document.createElement('div');
    opt.textContent = m.text;
    opt.onclick = () => addNewField(m.val);
    optionsDiv.appendChild(opt);
  });
}

function getCharCounts(str) {
  const counts = {};
  for (const char of str) { counts[char] = (counts[char] || 0) + 1; }
  return counts;
}

async function doSearch() {
  const status = document.getElementById("status");
  const tbody = document.getElementById("results");
  
  const onlyGeneral = document.getElementById('filter-general').checked;
  const exCats = [];
  if(document.getElementById('ex-proper').checked) exCats.push("固有名詞");
  if(document.getElementById('ex-person').checked) exCats.push("人名");
  if(document.getElementById('ex-place').checked) exCats.push("地名");
  if(document.getElementById('ex-work').checked) exCats.push("作品名");
  const exVerb = document.getElementById('ex-verb').checked;

  status.innerText = "データ読み込み中...";
  try {
    const resIdx = await fetch(`${REPO_URL}/index.json?t=${Date.now()}`);
    const indexData = await resIdx.json();
    const promises = indexData.files.map(file => fetch(`${REPO_URL}/${file}?t=${Date.now()}`).then(r => r.json()));
    const chunkResults = await Promise.all(promises);
    const allData = chunkResults.flat();
    
    const allReadings = new Set(allData.map(d => String(d[1])));

    const filtered = allData.filter(row => {
      const [word, reading, note, boin, len, isGen, attr, katsuyo] = row;
      const sReading = String(reading || "");
      const sAttr = String(attr || "");
      const sBoin = String(boin || "");

      const baseLen = document.getElementById('base-len').value;
      if (baseLen && len != baseLen) return false;
      if (document.getElementById('base-start').value && !sReading.startsWith(document.getElementById('base-start').value)) return false;
      if (document.getElementById('base-end').value && !sReading.endsWith(document.getElementById('base-end').value)) return false;
      
      const bWild = document.getElementById('base-wild').value;
      if (bWild) {
        const pattern = new RegExp('^' + bWild.replace(/\?/g, '.') + '$');
        if (!pattern.test(sReading)) return false;
      }

      if (onlyGeneral && isGen !== "一般的") return false;
      if (exCats.some(cat => sAttr.includes(cat))) return false;
      if (exVerb && sAttr.includes("動詞")) return false;

      const dynamicRows = Array.from(document.querySelectorAll('.cond-row'));
      for (const dRow of dynamicRows) {
        const type = dRow.dataset.type;
        const v1 = dRow.querySelector('.val1')?.value;
        const v2 = dRow.querySelector('.val2')?.value;
        if (!v1 && type !== 'replace') continue;

        if (type === 'n-pos') {
          if (sReading[parseInt(v1)-1] !== v2) return false;
        }
        else if (type === 'contains-n') {
          const count = (sReading.split(v1).length - 1);
          const op = dRow.querySelector('.op').value;
          const targetNum = parseInt(v2);
          if (op === 'eq' && count !== targetNum) return false;
          if (op === 'ge' && count < targetNum) return false;
          if (op === 'le' && count > targetNum) return false;
        }
        else if (type === 'seq' && !sReading.includes(v1)) return false;
        else if (type === 'rhyme-full' && sBoin !== v1) return false;
        else if (type === 'rhyme-end' && !sBoin.endsWith(v1)) return false;
        else if (type === 'all-in') {
          const req = getCharCounts(v1);
          const target = getCharCounts(sReading);
          for (const c in req) { if ((target[c]||0) < req[c]) return false; }
        }
        else if (type === 'only' && !(new RegExp('^[' + v1 + ']+$')).test(sReading)) return false;
        else if (type === 'excl') {
          for (const c of v1) { if (sReading.includes(c)) return false; }
        }
        else if (type === 'replace') {
          if (!sReading.includes(v1)) return false;
          const replaced = sReading.split(v1).join(v2 || "");
          if (!allReadings.has(replaced)) return false;
        }
      }
      return true;
    });

    status.innerText = filtered.length + " 件ヒット";
    tbody.innerHTML = filtered.map(r => `
      <tr>
        <td>${r[4]}</td>
        <td><a class="word-link" target="_blank" href="https://www.google.com/search?q=${encodeURIComponent(r[0])}">${r[0]}</a></td>
        <td>${r[1]}</td>
        <td><small style="color:#888">[${r[6] || ""}]</small> ${r[2] || ""}</td>
      </tr>`).join("");
  } catch (err) {
    status.innerText = "エラー: " + err;
  }
}
</script>
</body>
</html>
